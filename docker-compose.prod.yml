version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketiq}
      POSTGRES_DB: ${POSTGRES_DB:-marketiq}
    volumes:
      - marketiq_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-marketiq} -d ${POSTGRES_DB:-marketiq}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${SERVER_IMAGE:-marketiq-server:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://marketiq:marketiq@db:5432/marketiq}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"

  ml-service:
    image: ${ML_IMAGE:-marketiq-ml:latest}
    restart: unless-stopped
    environment:
      MODEL_PATH: ./model.pkl
      FLASK_ENV: production
    ports:
      - "5001:5001"

volumes:
  marketiq_postgres_data:
