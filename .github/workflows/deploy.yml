name: Deploy Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          echo "server_image=ghcr.io/${{ github.repository_owner }}/marketiq-server" >> "$GITHUB_OUTPUT"
          echo "ml_image=ghcr.io/${{ github.repository_owner }}/marketiq-ml" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.meta.outputs.server_image }}:latest
            ${{ steps.meta.outputs.server_image }}:${{ github.sha }}

      - name: Build and push ML service image
        uses: docker/build-push-action@v6
        with:
          context: ./ml-service
          push: true
          tags: |
            ${{ steps.meta.outputs.ml_image }}:latest
            ${{ steps.meta.outputs.ml_image }}:${{ github.sha }}

      - name: Summarize deployment artifacts
        run: |
          echo "Server image: ${{ steps.meta.outputs.server_image }}"
          echo "ML image: ${{ steps.meta.outputs.ml_image }}"
          echo "Images pushed to GitHub Container Registry"
